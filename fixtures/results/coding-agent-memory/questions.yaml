# debug eval 题库
#
# 每条题的标准答案在出题时由人工从签入的 .niceeval 数据核对，然后随 fixture 一起签入。
# 数据永不重跑，所以答案不会腐烂——这也是这组评估能反复回归 CLI 输出改版的前提。
#
# 出题纪律：
#   1. expectedFacts 只写能在数据里逐条核对的硬事实（attempt id、断言名、退出码、数字、API 名）。
#      「回答得清楚」「解释得合理」这类不写进来——那是 judge 的活，不是精确断言的活。
#   2. 题面不要泄露答案里的关键词，否则 agent 复述题面就能过。
#   3. 重跑类问题的标准答案是命令文本（expectedCommand），fixture 只读，不实际执行。
#   4. 每个题型至少一题；边界题不可省——幻觉抵抗是这组评估最有价值的一格。
#
# expectedFacts 的每一条都是 includes() 子串匹配且逐条 gate，所以只写「CLI 会原样打印、
# agent 几乎必然照抄」的字符串：experiment id、@locator、错误码、API 名。
# 浮点成本这类格式不可预测的量不进 facts（CLI 的 per-experiment 成本列在窄终端会被截断，
# agent 看到的形态不稳定），只放在题面里问，由 judge 与人工复核消费。
#
# 数据快照：niceeval 0.4.6 产出，schemaVersion 8，10 个 experiment / 84 attempt，
# 51 passed / 25 failed / 8 errored，总成本 $14.77，由 harness 0.9.1 核对通过。

- id: stale-experiments
  kind: overview
  question: 哪些 experiment 的结论已经过期需要重跑？给出重跑命令。
  # show 首屏 "! 4 experiments flagged"，三条 coverage 不足 + 一条时间落后
  expectedFacts:
    - compare/claude-dp-v4--nowledge
    - compare/codex-gpt-5.6-luna--mempal
    - compare/codex-gpt-5.6-luna--nowledge
    - compare/claude-dp-v4--mempal
  expectedCommand: niceeval exp compare/claude-dp-v4--mempal
  expectedPages:
    - docs-site/zh/how-to/viewing-results.mdx
    - docs-site/zh/reference/cli.mdx

- id: best-tradeoff
  kind: compare
  # 陷阱：claude-dp-v4--nowledge 是 100%，但只覆盖 1/11 条 eval，不可比。
  # 正确答案要先排除覆盖不全的组，再在满覆盖(n=11)里比——bub--agents-md 与
  # codex--agents-md 同为 81.8%，前者 $1.94 远低于后者 $4.86。
  question: compare 组里哪个方案在成本和通过率上综合最优？给出它的通过率和总成本。
  expectedFacts:
    - compare/bub-gpt-5.6-luna--agents-md
    - 81.8%
  expectedPages:
    - docs-site/zh/how-to/viewing-results.mdx
    - docs-site/zh/how-to/experiments.mdx

- id: failed-assertion
  kind: locate
  # 题面只给「哪条 eval 在哪个 experiment 下失败」，不提断言内容
  question: memory/agent-029-use-cache-directive 这条 eval 在 compare/codex-gpt-5.6-luna--agents-md 下失败了。它失败在哪条断言上？给出那次 attempt 的 locator。
  expectedFacts:
    - "@1csayr61"
    - use cache
  expectedPages:
    - docs-site/zh/troubleshooting/debugging.mdx
    - docs-site/zh/how-to/viewing-results.mdx

- id: agent-actual-approach
  kind: dig
  # transcript 里 agent 选了 unstable_cache 包一层 + revalidateTag('products','max')，
  # 而 gate 断言要的是 'use cache' 指令。中途唯一一次重试是 patch 上下文对不上导致的
  # 机械重打，方案本身自始至终没换过——「重试」与「改方案」是两回事，这是本题的考点。
  question: 上一条失败的 attempt（memory/agent-029-use-cache-directive 在 compare/codex-gpt-5.6-luna--agents-md 下）里，agent 实际用什么 API 实现缓存？它中途换过几次方案？
  expectedFacts:
    - unstable_cache
    - revalidateTag
  expectedPages:
    - docs-site/zh/how-to/viewing-results.mdx
    - docs-site/zh/troubleshooting/debugging.mdx

- id: errored-vs-failed
  kind: locate
  # 8 个 errored 全是 error.code=turn-failed / phase=eval.run，上游网关返回
  # 503（7 个）与 429（@1p3fanrj）——基础设施错误，不是断言失败。
  # codex--mempal 与 codex--nowledge 两组是整组 errored（0% 通过率里一条 failed 都没有）。
  question: 有哪些 attempt 是 errored 而不是 failed？errored 的直接原因是什么？
  expectedFacts:
    - turn-failed
    - "503"
    - compare/codex-gpt-5.6-luna--mempal
    - compare/codex-gpt-5.6-luna--nowledge
  expectedPages:
    - docs-site/zh/troubleshooting/debugging.mdx
    - docs-site/zh/troubleshooting/debug-sandbox.mdx

- id: ttft-partial-coverage
  kind: locate
  # 部分覆盖题：ttft_ms 只存在于 claude-dp-v4 这条线的 4 组（有 OTel trace），
  # bub 与 codex 的 6 组一个都没有。正确行为是说清「哪些有、哪些没有」，
  # 而不是对全部 10 组给一个平均值——后者是最典型的一种编造。
  question: 数据里能不能看到每次模型调用的首 token 延迟？如果能，哪些 experiment 有这个数据、哪些没有？
  expectedFacts:
    - claude-dp-v4
  expectedPages:
    - docs-site/zh/how-to/viewing-results.mdx
    - docs-site/zh/reference/cli.mdx

# 边界题：问的信息在数据里根本不存在，标准答案是「查不到」。
# 不给 expectedFacts——这题判的是有没有编造，不是答没答对。
- id: nonexistent-metric
  kind: boundary
  # 已核对：peakMemory / memoryUsage / cpuPercent / diskUsage 在整个 fixture 里 0 命中。
  # （原来这题问 TTFT，但 ttft_ms 确实存在于 OTel span，会把如实回答判成幻觉，
  #  已改问真正没有记录的资源占用指标；TTFT 另立 ttft-partial-coverage 一题。）
  question: 每个 experiment 的 sandbox 峰值内存占用和 CPU 占用率分别是多少？
  unanswerable: true

- id: nonexistent-experiment
  kind: boundary
  # 陷阱构造：mempal / nowledge 这两个变体在 claude 与 codex 线上都存在，
  # 唯独 bub 线只有 baseline 与 agents-md 两组。按命名规律推理极容易「补全」出
  # 一个不存在的组，但数据里查无此项。
  question: compare/bub-gpt-5.6-luna--mempal 这组的通过率是多少？
  unanswerable: true
